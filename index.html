<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
   
    <div class="container">
     
      <div class="todo-app">
        <header class="todo-header">
          <h1>My todo List</h1>
          <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="todo-input-container">
          <input
            type="text"
            name=""
            id="todoInput"
            class="todo-input"
            placeholder="Add a new task..."
            autocomplete="off"
            value=""
          />
          <button id="addTodoBtn" class="add-todo-btn">Add</button>
        </div>

        <div class="filter-container">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todoList" class="todo-list">
          <!-- //list of todos dynamically added.     -->
        </ul>

        <div class="todo-footer">
          <span id="itemsLeft" class="items-left"><span id="remaining-count">0</span> items left</span>
          <button id="clearCompleteBtn" class="clear-completed">
            Clear Completed
          </button>
        </div>
      </div>
    </div>
    <!-- <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="script.js"></script>
    
  </body>
</html>
